<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hesoyam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      padding: 2rem;
      user-select: none;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #10b981;
    }
    .header .version {
      font-size: 0.7rem;
      color: #52525b;
      background: #18181b;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .card-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 0.5rem;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.active { background: #10b981; }
    .dot.idle { background: #3f3f46; }
    .dot.warning { background: #f59e0b; }
    .status-text { font-size: 0.875rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-sub { font-size: 0.75rem; color: #71717a; margin-top: 2px; }
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
      color: white;
    }
    .btn-primary { background: #10b981; }
    .btn-primary:hover { background: #059669; }
    .btn-sm {
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
    }
    .hint {
      text-align: center;
      color: #52525b;
      font-size: 0.7rem;
      margin-top: 1rem;
    }
    .auth-prompt {
      padding: 0.5rem 0;
    }
    .auth-prompt p {
      color: #a1a1aa;
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    .auth-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: #09090b;
      color: #fafafa;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      outline: none;
    }
    .auth-input:focus { border-color: #10b981; }
    .auth-error {
      color: #ef4444;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
      display: none;
    }
    .auth-link {
      text-align: center;
      margin-top: 0.5rem;
    }
    .auth-link a {
      color: #71717a;
      font-size: 0.7rem;
      text-decoration: underline;
      cursor: pointer;
    }
    .auth-link a:hover { color: #a1a1aa; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pause-bar {
      margin-bottom: 0.75rem;
    }
    .btn-pause {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #27272a;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
      color: white;
      background: #18181b;
      transition: background 0.15s;
    }
    .btn-pause:hover { background: #27272a; }
    .btn-pause.tracking { border-color: #065f46; color: #6ee7b7; }
    .btn-pause.paused { border-color: #92400e; color: #fbbf24; }
    .process-list {
      max-height: 140px;
      overflow-y: auto;
    }
    .process-list::-webkit-scrollbar { width: 4px; }
    .process-list::-webkit-scrollbar-track { background: transparent; }
    .process-list::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
    .process-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.35rem 0;
      border-bottom: 1px solid #1e1e21;
    }
    .process-row:last-child { border-bottom: none; }
    .process-name {
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 0.5rem;
    }
    .badge {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .badge-known { background: #064e3b; color: #6ee7b7; }
    .badge-custom { background: #451a03; color: #fbbf24; cursor: pointer; }
    .badge-custom:hover { background: #78350f; }
    .btn-track {
      padding: 2px 8px;
      border: 1px solid #27272a;
      border-radius: 4px;
      background: #18181b;
      color: #a1a1aa;
      font-size: 0.65rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-track:hover { background: #27272a; color: #fafafa; }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .btn-refresh {
      padding: 2px 8px;
      border: 1px solid #27272a;
      border-radius: 4px;
      background: transparent;
      color: #71717a;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .btn-refresh:hover { color: #fafafa; background: #27272a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Hesoyam</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div id="auth-card" class="card" style="display:none">
    <div class="auth-prompt">
      <p>Sign in to sync game sessions to the cloud.</p>
      <div id="auth-error" class="auth-error"></div>
      <input type="email" id="auth-email" class="auth-input" placeholder="Email" />
      <input type="password" id="auth-password" class="auth-input" placeholder="Password" />
      <button class="btn btn-primary" id="auth-submit" style="width:100%" onclick="signIn()">Sign In</button>
      <div class="auth-link"><a onclick="openSignup()">Don't have an account? Sign up</a></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Status</div>
    <div class="status-row" id="tracking-status">
      <span class="dot idle"></span>
      <span class="status-text">Starting up...</span>
    </div>
  </div>

  <div class="pause-bar">
    <button class="btn-pause tracking" id="pause-btn" onclick="togglePause()">Pause Tracking</button>
  </div>

  <div class="card">
    <div class="card-label">Today</div>
    <div class="stat-value" id="today-time">0h 0m</div>
    <div class="stat-sub" id="today-sub">No games tracked yet</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-label" style="margin-bottom:0">Running Apps</div>
      <button class="btn-refresh" onclick="loadProcesses()">Refresh</button>
    </div>
    <div class="process-list" id="process-list">
      <div style="color:#52525b;font-size:0.75rem;padding:0.5rem 0">Loading...</div>
    </div>
  </div>

  <p class="hint">This window can be closed &mdash; Hesoyam continues tracking in the system tray.</p>

  <script>
    const { invoke } = window.__TAURI__.core;

    async function checkAuth() {
      try {
        const isAuthed = await invoke('get_auth_status');
        const card = document.getElementById('auth-card');
        card.style.display = isAuthed ? 'none' : 'block';
      } catch (e) {
        console.error('Auth check failed:', e);
      }
    }

    async function signIn() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errorEl = document.getElementById('auth-error');
      const submitBtn = document.getElementById('auth-submit');

      if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        await invoke('sign_in', { email, password });
        checkAuth();
      } catch (e) {
        errorEl.textContent = e;
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    }

    function openSignup() {
      window.__TAURI__.shell.open('https://hesoyam.gg/signup');
    }

    let isPaused = false;

    async function togglePause() {
      try {
        if (isPaused) {
          await invoke('resume_tracking');
        } else {
          await invoke('pause_tracking');
        }
        await updateStatus();
      } catch (e) {
        console.error('Toggle pause failed:', e);
      }
    }

    async function updateStatus() {
      try {
        const status = await invoke('get_tracking_status');
        const el = document.getElementById('tracking-status');
        const todayTime = document.getElementById('today-time');
        const todaySub = document.getElementById('today-sub');
        const pauseBtn = document.getElementById('pause-btn');

        isPaused = status.is_paused;

        if (isPaused) {
          pauseBtn.textContent = 'Resume Tracking';
          pauseBtn.className = 'btn-pause paused';
        } else {
          pauseBtn.textContent = 'Pause Tracking';
          pauseBtn.className = 'btn-pause tracking';
        }

        if (isPaused) {
          el.innerHTML = '<span class="dot warning"></span><span class="status-text">Tracking paused</span>';
        } else if (status.is_tracking && status.active_sessions.length > 0) {
          const session = status.active_sessions[0];
          const customBadge = session.is_custom ? ' (custom)' : '';
          const mins = Math.floor(session.duration_secs / 60);
          const hrs = Math.floor(mins / 60);
          const m = mins % 60;
          el.innerHTML = `<span class="dot active"></span><span class="status-text">Playing: ${session.game_name}${customBadge} (${hrs}h ${m}m)</span>`;
        } else {
          el.innerHTML = '<span class="dot idle"></span><span class="status-text">No game detected</span>';
        }

        const totalMins = Math.floor(status.today_total_secs / 60);
        const totalHrs = Math.floor(totalMins / 60);
        const remMins = totalMins % 60;
        todayTime.textContent = `${totalHrs}h ${remMins}m`;

        if (status.active_sessions.length > 0) {
          todaySub.textContent = `${status.active_sessions.length} game${status.active_sessions.length > 1 ? 's' : ''} active`;
        } else if (status.today_total_secs > 0) {
          todaySub.textContent = 'Session ended';
        } else {
          todaySub.textContent = 'No games tracked yet';
        }
      } catch (e) {
        console.error('Status update failed:', e);
      }
    }

    async function loadProcesses() {
      try {
        const data = await invoke('get_running_processes');
        const list = document.getElementById('process-list');

        if (!data.processes || data.processes.length === 0) {
          list.innerHTML = '<div style="color:#52525b;font-size:0.75rem;padding:0.5rem 0">No user processes found</div>';
          return;
        }

        list.innerHTML = data.processes.map((p, i) => {
          let action = '';
          if (p.is_known_game) {
            action = '<span class="badge badge-known">Auto-tracked</span>';
          } else if (p.is_tracked) {
            action = `<span class="badge badge-custom" data-idx="${i}">Tracking</span>`;
          } else {
            action = `<button class="btn-track" data-idx="${i}">Track</button>`;
          }
          return `<div class="process-row"><span class="process-name">${escHtml(p.name)}</span>${action}</div>`;
        }).join('');

        // Bind click handlers via data attributes to avoid inline JS escaping issues
        list.querySelectorAll('.btn-track').forEach(btn => {
          const proc = data.processes[parseInt(btn.dataset.idx)];
          btn.onclick = () => trackProcess(proc.name);
        });
        list.querySelectorAll('.badge-custom').forEach(btn => {
          const proc = data.processes[parseInt(btn.dataset.idx)];
          btn.onclick = () => untrackProcess(proc.name);
        });
      } catch (e) {
        console.error('Failed to load processes:', e);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    async function trackProcess(processName) {
      const defaultName = processName.replace(/\.exe$/i, '');
      const gameName = prompt('Enter a name for this game:', defaultName);
      if (!gameName) return;
      try {
        await invoke('add_custom_tracking', { processName, gameName });
        loadProcesses();
      } catch (e) {
        console.error('Failed to add custom tracking:', e);
      }
    }

    async function untrackProcess(processName) {
      try {
        await invoke('remove_custom_tracking', { processName });
        loadProcesses();
      } catch (e) {
        console.error('Failed to remove custom tracking:', e);
      }
    }

    checkAuth();
    updateStatus();
    loadProcesses();
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
