name: raid
description: "RAID — Track your gaming life"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Core
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  # riverpod_annotation: ^2.6.1  # Re-add with riverpod_generator when analyzer_plugin is fixed
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  gap: ^3.0.1

  # Env
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.staging
    - .env.production
